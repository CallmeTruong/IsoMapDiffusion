<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigapixel Isometric Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
        }
        #map-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="map-viewer"></div>

    <script>
        
        const viewer = OpenSeadragon({
            id: "map-viewer",
            
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            
            tileSources: "/output/gigapixel_map.dzi",

            showNavigator: true,                
            navigatorPosition: "BOTTOM_RIGHT",
            animationTime: 0.3,
            blendTime: 0.1,
            constrainDuringPan: true,
            maxZoomPixelRatio: 2,
            visibilityRatio: 0.5,
            imageLoaderLimit: 8,
            maxImageCacheCount: 1000,
            timeout: 30000,

            immediateRender: false,
            minPixelRatio: 0.5,
        });
    </script>

</body>
</html>
