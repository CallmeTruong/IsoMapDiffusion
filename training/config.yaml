# LoRA Training Configuration for Isometric Map Infilling

# Model
pretrained_model_name_or_path: Qwen/Qwen-Image-Edit

# Dataset - paths relative to project root
data_config:
  train_batch_size: 1
  num_workers: 4
  img_size: 1024
  caption_dropout_rate: 0.1
  img_dir: lora_dataset/targets
  control_dir: lora_dataset/templates
  caption_dir: null
  random_ratio: false
  caption_type: txt

# Output
output_dir: training/output/lora_saves
logging_dir: logs

# Training params
max_train_steps: 5000
learning_rate: 2e-4
lr_scheduler: constant
lr_warmup_steps: 10
gradient_accumulation_steps: 1
max_grad_norm: 1.0

# Optimizer
adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 0.01
adam_epsilon: 1e-8
adam8bit: false

# LoRA
rank: 16

# Performance
mixed_precision: "bf16"

# Checkpointing
checkpointing_steps: 250
checkpoints_total_limit: 5
resume_from_checkpoint: null

# Tracking
report_to: null
tracker_project_name: isometric-lora

# Caching - precompute embeddings for faster training
precompute_text_embeddings: true
precompute_image_embeddings: true
save_cache_on_disk: false

# Quantization (optional, for lower memory)
quantize: false
